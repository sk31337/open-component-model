# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration
#
# A unified cliff.toml. Replaces the per-component configs at cli/cliff.toml
# and kubernetes/controller/cliff.toml. I copied over whatever was relevant
# since both are now included in the release.

[changelog]
# A Tera template to be rendered for each release in the changelog.
# See https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}

### Quick installation and usage guide

#### CLI

Install the latest version of the OCM CLI:

```bash
curl -sfL https://ocm.software/install-cli.sh | bash
```

(For more installation options, see the [installation guide](https://ocm.software/docs/getting-started/install-the-ocm-cli/).)

You can also run the OCM CLI in a container without installing it:

```bash
docker run --rm -t ghcr.io/open-component-model/cli:latest --help
```

See the [container image guide](https://ocm.software/docs/how-to/how-to-use-the-ocm-cli-container-image/) for more details.

#### Controller

Install the latest version of the OCM Controllers into a Kubernetes cluster via Helm:

```bash
helm install ocm-k8s-toolkit oci://ghcr.io/open-component-model/kubernetes/controller/chart \\
  --namespace ocm-k8s-toolkit-system \\
  --create-namespace
```

See the [controller setup guide](https://ocm.software/docs/getting-started/set-up-controller-environments/) for more details.

{% if github.contributors | length > 0 %}
### Community & Contributors

This release we had a total of **{{ github.contributors | length }}** contributors!
If you want to engage with us, check our [community page](https://ocm.software/community/)!
{% endif %}
"""

# Remove leading and trailing whitespaces from the changelog's body.
trim = true
# Render body even when there are no releases to process.
render_always = true
# An array of regex based postprocessors to modify the changelog.
postprocessors = []

[git]
# Parse commits according to the conventional commits specification.
# See https://www.conventionalcommits.org
conventional_commits = true
# Exclude commits that do not match the conventional commits specification.
filter_unconventional = true
# Require all commits to be conventional. Takes precedence over filter_unconventional.
require_conventional = false
# Split commits on newlines, treating each line as an individual commit.
split_commits = false
# An array of regex based parsers to modify commit messages prior to further processing.
commit_preprocessors = []
# Prevent commits that are breaking from being excluded by commit parsers.
protect_breaking_commits = true
# An array of regex based parsers for extracting data from the commit message.
# Assigns commits to groups.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "^chore\\(deps.*\\)", group = "<!-- 2 -->📚 Dependencies" },
    { message = "^fix\\(deps.*\\)", group = "<!-- 2 -->📚 Dependencies" },
    { message = "^chore\\(docs.*\\)", group = "<!-- 8 -->📚 Documentation" },
    { message = "^fix\\(docs.*\\)", group = "<!-- 8 -->📚 Documentation" },
    { message = "^docs", group = "<!-- 8 -->📚 Documentation" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^chore|^ci|chore\\(ci.*\\)|fix\\(ci.*\\)", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
]
# Exclude commits that are not matched by any commit parser.
filter_commits = false
# An array of link parsers for extracting external references, and turning them into URLs, using regex.
link_parsers = []
# Order releases topologically instead of chronologically.
topo_order = false
# Order commits topologically within a release.
topo_order_commits = true
# Order of commits in each group/release within the changelog.
# Allowed values: newest, oldest
sort_commits = "oldest"
# Process submodules commits
recurse_submodules = false
