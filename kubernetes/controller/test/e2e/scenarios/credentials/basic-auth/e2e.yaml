requires: [protected-registry-basic-auth, kro, flux-source, flux-helm]

prepare:
  components:
    - ocmConfig: .ocmconfig
      registry: ${PROTECTED_REGISTRY_BASIC_AUTH}

deploy:
  - apply: bootstrap.yaml
    waitFor:
      kind: rgd
      name: basic-auth
      namespace: default
      conditions: [create, condition=Ready=true]
  - apply: deployer-instance.yaml

assert:
  resources:
    - kind: deployment.apps
      name: basic-auth-podinfo
      namespace: default
      waitFor: [create, condition=Available]
      pods:
        selector: app.kubernetes.io/name=basic-auth-podinfo
        condition: condition=Ready=true

debug:
  - kubectl: get pods -n flux-system -o wide
    label: flux-pods
  - kubectl: get events -n flux-system --sort-by=.lastTimestamp
    label: flux-events
  - kubectl: get helmrelease -A -o wide
    label: helmreleases
  - kubectl: get ocirepository -A -o wide
    label: ocirepositories
  - kubectl: get kustomization -A -o wide
    label: kustomizations
