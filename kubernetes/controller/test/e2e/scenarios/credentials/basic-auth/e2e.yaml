timeout: 5m

requires: [protected-registry-basic-auth, kro, flux-source, flux-helm]

prepare:
  components:
    - constructor: component-constructor.yaml
      ocmConfig: .ocmconfig
      registry: ${PROTECTED_REGISTRY_BASIC_AUTH}

deploy:
  - apply: bootstrap.yaml
  - apply: rgd.yaml
    waitFor:
      kind: rgd
      name: basic-auth
      namespace: default
      conditions: [create, condition=Ready=true]
  - apply: instance.yaml

assert:
  resources:
    - kind: deployment.apps
      name: basic-auth-podinfo
      namespace: default
      waitFor: [create, condition=Available]
      pods:
        selector: app.kubernetes.io/name=basic-auth-podinfo
        condition: condition=Ready=true
