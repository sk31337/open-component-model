timeout: 5m

requires: [protected-registry-docker-config-json,kro, flux-source, flux-helm, ]

prepare:
  components:
    - constructor: component-constructor.yaml
      ocmConfig: .ocmconfig
      registry: ${PROTECTED_REGISTRY_DOCKER_CONFIG_JSON}

deploy:
  - apply: bootstrap.yaml
  - waitFor:
      kind: rgd
      name: docker-config-json
      namespace: default
      conditions: [create, condition=Ready=true]
  - apply: instance.yaml

assert:
  resources:
    - kind: deployment.apps
      name: docker-config-json-podinfo
      namespace: default
      waitFor: [create, condition=Available]
      pods:
        selector: app.kubernetes.io/name=docker-config-json-podinfo
        condition: condition=Ready=true

debug:
  - kubectl: get pods -n flux-system -o wide
    label: flux-pods
  - kubectl: get events -n flux-system --sort-by=.lastTimestamp
    label: flux-events
  - kubectl: get helmrelease -A -o wide
    label: helmreleases
  - kubectl: get ocirepository -A -o wide
    label: ocirepositories
  - kubectl: get kustomization -A -o wide
    label: kustomizations
