---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ocm-k8s-toolkit.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/token
    verbs:
      - create
  - apiGroups:
      - delivery.ocm.software
    resources:
      - components
      - deployers
      - replications
      - repositories
      - resources
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - delivery.ocm.software
    resources:
      - components/finalizers
      - deployers/finalizers
      - replications/finalizers
      - repositories/finalizers
    verbs:
      - update
  - apiGroups:
      - delivery.ocm.software
    resources:
      - components/status
      - deployers/status
      - replications/status
      - repositories/status
      - resources/status
    verbs:
      - get
      - patch
      - update
