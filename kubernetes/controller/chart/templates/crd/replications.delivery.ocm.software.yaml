{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
    {{- if .Values.crd.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- if and .Values.webhook.enable .Values.certManager.enable }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "ocm-k8s-toolkit.resourceName" (dict "suffix" "serving-cert" "context" $) }}
    {{- end }}
  name: replications.delivery.ocm.software
spec:
  {{- if .Values.webhook.enable }}
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: {{ include "ocm-k8s-toolkit.resourceName" (dict "suffix" "webhook-service" "context" $) }}
          namespace: {{ .Release.Namespace }}
          path: /convert
      conversionReviewVersions:
        - v1
  {{- end }}
  group: delivery.ocm.software
  names:
    kind: Replication
    listKind: ReplicationList
    plural: replications
    singular: replication
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Indicates if the Replication is Ready
      jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Ready
      priority: 1
      type: string
    - description: Displays the Age of the Replication
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Replication is the Schema for the replications API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ReplicationSpec defines the desired state of Replication.
            properties:
              componentRef:
                description: ComponentRef is a reference to a Component whose resolved
                  version is transferred.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              ocmConfig:
                description: |-
                  OCMConfig defines references to secrets, config maps or ocm api
                  objects providing configuration data including credentials.
                items:
                  description: |-
                    OCMConfiguration defines a configuration applied to the reconciliation of an
                    ocm k8s object as well as the policy for its propagation of this
                    configuration.
                  properties:
                    apiVersion:
                      description: API version of the referent, if not specified the
                        Kubernetes preferred version will be used.
                      type: string
                    kind:
                      description: Kind of the referent.
                      type: string
                    name:
                      description: Name of the referent.
                      type: string
                    namespace:
                      description: Namespace of the referent, when not specified it
                        acts as LocalObjectReference.
                      type: string
                    policy:
                      default: Propagate
                      description: |-
                        Policy affects the propagation behavior of the configuration. If set to
                        ConfigurationPolicyPropagate other ocm api objects can reference this
                        object to reuse this configuration.
                      enum:
                      - Propagate
                      - DoNotPropagate
                      type: string
                  required:
                  - kind
                  - name
                  - policy
                  type: object
                  x-kubernetes-validations:
                  - message: apiVersion must be one of "v1" with kind "Secret" or
                      "ConfigMap" or "delivery.ocm.software/v1alpha1" with the kind
                      of an OCM kubernetes object
                    rule: ((!has(self.apiVersion) || self.apiVersion == "" || self.apiVersion
                      == "v1") && (self.kind == "Secret" || self.kind == "ConfigMap"))
                      || (self.apiVersion == "delivery.ocm.software/v1alpha1" && (self.kind
                      == "Repository" || self.kind == "Component" || self.kind ==
                      "Resource" || self.kind == "Replication"))
                type: array
              suspend:
                description: |-
                  Suspend tells the controller to suspend the reconciliation of this
                  Replication.
                type: boolean
              targetRepositoryRef:
                description: TargetRepositoryRef is a reference to the Repository
                  the transfer happens to.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - componentRef
            - targetRepositoryRef
            type: object
          status:
            description: ReplicationStatus defines the observed state of Replication.
            properties:
              component:
                description: Component reflects the currently observed source component
                  version.
                properties:
                  component:
                    type: string
                  digest:
                    description: Digest information of the Component, if available
                      as per OCM specification.
                    properties:
                      hashAlgorithm:
                        description: |-
                          HashAlgorithm specifies the hashing algorithm applied after normalization.
                          The choice of algorithm impacts compatibility across verifiers.

                          See specification reference:
                            - https://github.com/open-component-model/ocm-spec/blob/main/doc/04-extensions/04-algorithms/digest-algorithms.md
                        type: string
                      normalisationAlgorithm:
                        description: |-
                          NormalisationAlgorithm defines how the component descriptor or artifact
                          is transformed into a stable byte representation before hashing.
                          Normalization ensures reproducibility by excluding volatile fields
                          such as transport-related access specifications.

                          See specification references:
                            - https://github.com/open-component-model/ocm-spec/blob/main/doc/04-extensions/04-algorithms/component-descriptor-normalization-algorithms.md
                            - https://github.com/open-component-model/ocm-spec/blob/main/doc/04-extensions/04-algorithms/artifact-normalization-types.md
                        type: string
                      value:
                        description: |-
                          Value is the encoded digest result produced from the normalized representation.
                          Typically hex or base64 encoded, depending on the algorithm specification.
                        type: string
                    required:
                    - hashAlgorithm
                    - normalisationAlgorithm
                    - value
                    type: object
                  repositorySpec:
                    x-kubernetes-preserve-unknown-fields: true
                  version:
                    type: string
                required:
                - component
                - repositorySpec
                - version
                type: object
              conditions:
                description: Conditions holds the conditions for the Replication.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              effectiveOCMConfig:
                description: |-
                  EffectiveOCMConfig specifies the entirety of config maps and secrets
                  whose configuration data was applied to the Replication reconciliation,
                  in the order the configuration data was applied.
                items:
                  description: |-
                    OCMConfiguration defines a configuration applied to the reconciliation of an
                    ocm k8s object as well as the policy for its propagation of this
                    configuration.
                  properties:
                    apiVersion:
                      description: API version of the referent, if not specified the
                        Kubernetes preferred version will be used.
                      type: string
                    kind:
                      description: Kind of the referent.
                      type: string
                    name:
                      description: Name of the referent.
                      type: string
                    namespace:
                      description: Namespace of the referent, when not specified it
                        acts as LocalObjectReference.
                      type: string
                    policy:
                      default: Propagate
                      description: |-
                        Policy affects the propagation behavior of the configuration. If set to
                        ConfigurationPolicyPropagate other ocm api objects can reference this
                        object to reuse this configuration.
                      enum:
                      - Propagate
                      - DoNotPropagate
                      type: string
                  required:
                  - kind
                  - name
                  - policy
                  type: object
                  x-kubernetes-validations:
                  - message: apiVersion must be one of "v1" with kind "Secret" or
                      "ConfigMap" or "delivery.ocm.software/v1alpha1" with the kind
                      of an OCM kubernetes object
                    rule: ((!has(self.apiVersion) || self.apiVersion == "" || self.apiVersion
                      == "v1") && (self.kind == "Secret" || self.kind == "ConfigMap"))
                      || (self.apiVersion == "delivery.ocm.software/v1alpha1" && (self.kind
                      == "Repository" || self.kind == "Component" || self.kind ==
                      "Resource" || self.kind == "Replication"))
                type: array
              lastFailedTransferEvents:
                description: |-
                  LastFailedTransferEvents contains detailed events about the transfer if it failed.
                  If it's empty, there was no failed last transfer. Is cleaned upon a successful transfer.
                items:
                  description: |-
                    TransferEvent captures a single failed transformation observed during a
                    replication transfer.
                  properties:
                    error:
                      description: Error is the error message reported by the failed
                        transformation.
                      type: string
                    id:
                      description: ID is the identifier of the transformation that
                        failed.
                      type: string
                    name:
                      description: Name is the display name of the transformation
                        in the form "ID [Type]".
                      type: string
                  required:
                  - error
                  - id
                  - name
                  type: object
                type: array
              lastTransferredDigest:
                description: LastTransferredDigest records the component digest of
                  the last successful transfer.
                type: string
              lastTransferredVersion:
                description: LastTransferredVersion records the component version
                  of the last successful transfer.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the last observed generation of the Replication
                  object.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
