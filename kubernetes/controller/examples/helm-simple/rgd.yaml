# kind delete cluster --name kind && task kubernetes/controller:test/e2e/setup/local && task kubernetes/controller:install && task kubernetes/controller:deploy 
# ocm add componentversions --create --file ./ctf component-constructor.yaml && ocm transfer ctf --overwrite --enforce --copy-resources --omit-access-types gitHub ./ctf http://image-registry:5000 && k apply -f bootstrap.yaml -f instance.yaml
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: helm-simple
spec:
  schema:
    apiVersion: v1alpha1
    kind: HelmSimple
    spec:
      prefix: string | default="helm-simple"
  resources:
    - id: resourceChart
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: "${schema.spec.prefix}-resource-chart-name"
        spec:
          componentRef:
            name: helm-simple-component
          resource:
            byReference:
              resource:
                name: helm-resource
          additionalStatusFields:
            registry: resource.access.toOCI().registry
            repository: resource.access.toOCI().repository
            digest: resource.access.toOCI().digest
            tag: resource.access.toOCI().tag          
    - id: ocirepository
      template:
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: "${schema.spec.prefix}-oci-repository-name"
        spec:
          interval: 1m0s
          insecure: true
          layerSelector:
            mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
            operation: copy
          url: oci://${resourceChart.status.additional.registry}/${resourceChart.status.additional.repository}
          ref:
            digest: ${resourceChart.status.additional.digest}
    - id: helmrelease
      template:
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: "${schema.spec.prefix}-helm-release-name"
        spec:
          releaseName: helm-simple
          interval: 1m
          timeout: 5m
          chartRef:
            kind: OCIRepository
            name: ${ocirepository.metadata.name}
            namespace: default
    - id: argocdApplication
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: "${schema.spec.prefix}"
          namespace: argocd
        spec:
          project: default
          source:
            chart: podinfo
            helm:
              releaseName: ${ocirepository.metadata.name}
            path: .
            repoURL: oci://${resourceChart.status.additional.?registry}/${resourceChart.status.additional.?repository}
            # working -> oci://image-registry:5000/stefanprodan/charts/podinfo
            targetRevision: ${resourceChart.status.additional.?tag}
          destination:
            server: https://kubernetes.default.svc
            namespace: default-argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
