# kind delete cluster --name kind && task kubernetes/controller:test/e2e/setup/local && task kubernetes/controller:install && task kubernetes/controller:deploy 
# ocm add componentversions --create --file ./ctf component-constructor.yaml && ocm transfer ctf --overwrite --enforce --copy-resources --omit-access-types gitHub ./ctf http://image-registry:5000 && k apply -f bootstrap.yaml -f instance.yaml

apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: helm-simple-repository
spec:
  repositorySpec:
    # Adjust to your OCM repository
    baseUrl: http://image-registry:5000
    type: OCIRegistry
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: helm-simple-component
spec:
  component: ocm.software/ocm-k8s-toolkit/examples/helm-simple
  repositoryRef:
    name: helm-simple-repository
  semver: 1.0.0
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  name: helm-simple-resource-rgd
spec:
  componentRef:
    name: helm-simple-component
  resource:
    byReference:
      resource:
        name: kro-rgd
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Deployer
metadata:
  name: helm-simple-deployer
spec:
  resourceRef:
    name: helm-simple-resource-rgd
    namespace: default