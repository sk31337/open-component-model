# Credentials for the target protected registry (admin/admin) plus the transfer
# settings (recursive, localBlob copy), consumed by the target Repository and the
# Replication when writing the transferred component.
apiVersion: v1
kind: Secret
metadata:
  name: replication-simple-credentials
data:
  .ocmconfig: ""
---
# Source repository: the unauthenticated in-cluster registry the component is pushed to.
apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: replication-simple-source
spec:
  repositorySpec:
    baseUrl: http://image-registry:5000
    type: OCIRegistry
  interval: 10m
---
# Target repository: the password-protected registry the component is replicated into.
apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: replication-simple-target
spec:
  repositorySpec:
    baseUrl: http://protected-registry1-internal.default.svc.cluster.local:5002
    scheme: http
    port: 5002
    type: OCIRegistry
  interval: 10m
  ocmConfig:
    - kind: Secret
      name: replication-simple-credentials
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: replication-simple-component
spec:
  component: ocm.software/ocm-k8s-toolkit/examples/replication-simple
  repositoryRef:
    name: replication-simple-source
  semver: 1.0.0
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Replication
metadata:
  name: replication-simple
spec:
  componentRef:
    name: replication-simple-component
  targetRepositoryRef:
    name: replication-simple-target
  ocmConfig:
    - kind: Secret
      name: replication-simple-credentials
