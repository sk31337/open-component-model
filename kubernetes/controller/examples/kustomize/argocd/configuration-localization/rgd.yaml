apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: kustomize-argocd-configuration-localization
spec:
  schema:
    apiVersion: v1alpha1
    kind: KustomizeArgocdConfigurationLocalization
    spec:
      prefix: string | default="kustomize-argocd-configuration-localization"
      podinfo:
        message: string | default="hello world"
  resources:
    - id: resourceKustomization
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: "${schema.spec.prefix}-resource-name"
        spec:
          componentRef:
            name: kustomize-argocd-configuration-localization-component
          resource:
            byReference:
              resource:
                name: kustomize-resource
    - id: resourceImage
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: "${schema.spec.prefix}-resource-image-name"
        spec:
          componentRef:
            name: kustomize-argocd-configuration-localization-component
          resource:
            byReference:
              resource:
                name: image-resource
          additionalStatusFields:
            registry: resource.access.toOCI().registry
            repository: resource.access.toOCI().repository
            tag: resource.access.toOCI().tag
    - id: argocdApplication
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: "${schema.spec.prefix}"
          namespace: argocd
          finalizers:
            - resources-finalizer.argocd.argoproj.io
        spec:
          project: default
          source:
            repoURL: ${resourceKustomization.status.resource.access.repoUrl}
            targetRevision: ${resourceKustomization.status.resource.access.commit}
            path: kustomize
            kustomize:
              # Localization + Configuration patches mirror the Flux variant's
              # Kustomization.spec.patches; ArgoCD ≥ 2.10 supports kustomize.patches
              # with the same JSON6902 / strategic-merge syntax.
              patches:
                # Localization: rewrite container image to the OCM-published image-resource.
                - patch: |
                    - op: replace
                      path: /spec/template/spec/containers/0/image
                      value: ${resourceImage.status.additional.registry}/${resourceImage.status.additional.repository}:${resourceImage.status.additional.tag}
                  target:
                    kind: Deployment
                    name: .*
                # Configuration: inject PODINFO_UI_MESSAGE env var from the schema.
                - patch: |
                    - op: add
                      path: /spec/template/spec/containers/0/env/-
                      value:
                        name: PODINFO_UI_MESSAGE
                        value: ${schema.spec.podinfo.message}
                  target:
                    kind: Deployment
                    name: .*
                # e2e-test related patch to validate deployment
                - patch: |
                    - op: replace
                      path: /metadata/name
                      value: kustomize-argocd-configuration-localization-podinfo
                    - op: add
                      path: /spec/template/metadata/labels/app.kubernetes.io~1name
                      value: kustomize-argocd-configuration-localization-podinfo
                  target:
                    kind: Deployment
                    name: .*
                - patch: |
                    - op: replace
                      path: /spec/minReplicas
                      value: 1
                    - op: replace
                      path: /spec/maxReplicas
                      value: 1
                  target:
                    kind: HorizontalPodAutoscaler
                    name: .*
          destination:
            server: https://kubernetes.default.svc
            namespace: default-argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
