requires:
  - kro
  - argocd

prepare:
  components:
    - copyResources: true

deploy:
  - apply: bootstrap.yaml
    waitFor:
      - kubectl: "--for=create --for=condition=Ready=true rgd/kustomize-argocd-configuration-localization"
  - apply: instance.yaml
    waitFor:
      - kubectl: "--for=create --for=jsonpath={.status.sync.status}=Synced --for=jsonpath={.status.health.status}=Healthy applications.argoproj.io/kustomize-argocd-configuration-localization -n argocd"
      - kubectl: "--for=create --for=condition=Available deployment.apps/kustomize-argocd-configuration-localization-podinfo -n default-argocd"
      - kubectl: "--for=condition=Ready=true pod -l app.kubernetes.io/name=kustomize-argocd-configuration-localization-podinfo -n default-argocd"

assert:
  fieldEquals:
    - resource: pod -n default-argocd -l app.kubernetes.io/name=kustomize-argocd-configuration-localization-podinfo
      jsonPath: "'{.items[0].spec.containers[0].image}'"
      value: ${IMAGE_REGISTRY_HOST}/stefanprodan/podinfo:6.9.1
    - resource: pod -n default-argocd -l app.kubernetes.io/name=kustomize-argocd-configuration-localization-podinfo
      jsonPath: "'{.items[0].spec.containers[0].env[?(@.name==\"PODINFO_UI_MESSAGE\")].value}'"
      value: kustomize-argocd-configuration-localization

debug:
  - kubectl: get pods -n argocd -o wide
    label: argocd-pods
  - kubectl: get events -n argocd --sort-by=.lastTimestamp
    label: argocd-events
  - kubectl: get applications.argoproj.io -A -o wide
    label: argocd-apps
  - kubectl: logs -n argocd -l app.kubernetes.io/name=argocd-application-controller --tail=50
    label: argocd-controller-logs
