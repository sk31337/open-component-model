requires:
  - kro
  - argocd

deploy:
  - apply: bootstrap.yaml
    waitFor:
      - kubectl: "--for=create --for=condition=Ready=true rgd/kustomize-argocd-simple"
  - apply: instance.yaml
    waitFor:
      - kubectl: "--for=create --for=jsonpath={.status.sync.status}=Synced --for=jsonpath={.status.health.status}=Healthy applications.argoproj.io/kustomize-argocd-simple -n argocd"
      - kubectl: "--for=create --for=condition=Available deployment.apps/kustomize-argocd-simple-podinfo -n default-argocd"
      - kubectl: "--for=condition=Ready=true pod -l app.kubernetes.io/name=kustomize-argocd-simple-podinfo -n default-argocd"
debug:
  - kubectl: get pods -n argocd -o wide
    label: argocd-pods
  - kubectl: get events -n argocd --sort-by=.lastTimestamp
    label: argocd-events
  - kubectl: get applications.argoproj.io -A -o wide
    label: argocd-apps
  - kubectl: logs -n argocd -l app.kubernetes.io/name=argocd-application-controller --tail=50
    label: argocd-controller-logs
