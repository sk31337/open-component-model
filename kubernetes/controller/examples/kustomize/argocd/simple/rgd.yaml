apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: kustomize-argocd-simple
spec:
  schema:
    apiVersion: v1alpha1
    kind: KustomizeArgocdSimple
    spec:
      prefix: string | default="kustomize-argocd-simple"
  resources:
    - id: resourceKustomization
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: "${schema.spec.prefix}-resource-name"
        spec:
          componentRef:
            name: kustomize-argocd-simple-component
          resource:
            byReference:
              resource:
                name: kustomize-resource
    - id: argocdApplication
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: "${schema.spec.prefix}"
          namespace: argocd
          finalizers:
            - resources-finalizer.argocd.argoproj.io
        spec:
          project: default
          source:
            repoURL: ${resourceKustomization.status.resource.access.repoUrl}
            targetRevision: ${resourceKustomization.status.resource.access.commit}
            path: kustomize
            kustomize:
              # e2e-test related patches to validate deployment
              patches:
                - patch: |
                    - op: replace
                      path: /metadata/name
                      value: kustomize-argocd-simple-podinfo
                    - op: add
                      path: /spec/template/metadata/labels/app.kubernetes.io~1name
                      value: kustomize-argocd-simple-podinfo
                  target:
                    kind: Deployment
                    name: .*
                - patch: |
                    - op: replace
                      path: /spec/minReplicas
                      value: 1
                    - op: replace
                      path: /spec/maxReplicas
                      value: 1
                  target:
                    kind: HorizontalPodAutoscaler
                    name: .*
          destination:
            server: https://kubernetes.default.svc
            namespace: default-argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
