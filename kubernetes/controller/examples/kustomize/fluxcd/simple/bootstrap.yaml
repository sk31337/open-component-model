apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: kustomize-fluxcd-simple-repository
spec:
  repositorySpec:
    # Adjust to your OCM repository
    baseUrl: http://image-registry:5000
    type: OCIRegistry
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: kustomize-fluxcd-simple-component
spec:
  component: ocm.software/ocm-k8s-toolkit/examples/kustomize-fluxcd-simple
  repositoryRef:
    name: kustomize-fluxcd-simple-repository
  semver: 1.0.0
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  name: kustomize-fluxcd-simple-resource-rgd
spec:
  componentRef:
    name: kustomize-fluxcd-simple-component
  resource:
    byReference:
      resource:
        name: kro-rgd
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Deployer
metadata:
  name: kustomize-fluxcd-simple-deployer
spec:
  resourceRef:
    name: kustomize-fluxcd-simple-resource-rgd
    namespace: default