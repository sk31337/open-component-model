apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: helm-fluxcd-crossplane-configuration-localization-repository
spec:
  repositorySpec:
    # Adjust to your OCM repository
    baseUrl: http://image-registry:5000
    type: OCIRegistry
  interval: 10m
---

apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: helm-fluxcd-crossplane-configuration-localization-component
spec:
  component: ocm.software/ocm-k8s-toolkit/examples/helm-fluxcd-crossplane-configuration-localization
  repositoryRef:
    name: helm-fluxcd-crossplane-configuration-localization-repository
  semver: 1.0.0
  interval: 10m
