apiVersion: v1
kind: Secret
metadata:
  name: helm-fluxcd-crossplane-nested-signed-secret
data:
  # Base64 encoded value of the public key ocm.software.pub
  ocm.software: ""
---

apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: helm-fluxcd-crossplane-nested-signed-repository
spec:
  repositorySpec:
    # Adjust to your OCM repository
    baseUrl: http://image-registry:5000
    type: OCIRegistry
  interval: 10m
---

apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: helm-fluxcd-crossplane-nested-signed-component
spec:
  component: ocm.software/ocm-k8s-toolkit/examples/helm-fluxcd-crossplane-nested-signed
  verify:
    - signature: ocm.software
      secretRef:
        name: helm-fluxcd-crossplane-nested-signed-secret
  repositoryRef:
    name: helm-fluxcd-crossplane-nested-signed-repository
  semver: 1.0.0
  interval: 10m
