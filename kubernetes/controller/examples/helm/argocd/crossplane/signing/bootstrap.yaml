apiVersion: v1
kind: Secret
metadata:
  name: helm-argocd-crossplane-signing-secret
data:
  # Base64 encoded value of the public key ocm.software.pub
  ocm.software: ""
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: helm-argocd-crossplane-signing-repository
spec:
  repositorySpec:
    # Adjust to your OCM repository
    baseUrl: http://image-registry:5000
    type: OCIRegistry
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: helm-argocd-crossplane-signing-component
spec:
  component: ocm.software/ocm-k8s-toolkit/examples/helm-argocd-crossplane-signing
  verify:
    - signature: ocm.software
      secretRef:
        name: helm-argocd-crossplane-signing-secret
  repositoryRef:
    name: helm-argocd-crossplane-signing-repository
  semver: 1.0.0
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  name: helm-argocd-crossplane-signing-resource-xrd
spec:
  componentRef:
    name: helm-argocd-crossplane-signing-component
  resource:
    byReference:
      resource:
        name: crossplane-xrd
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Deployer
metadata:
  name: helm-argocd-crossplane-signing-deployer
spec:
  resourceRef:
    name: helm-argocd-crossplane-signing-resource-xrd
    namespace: default
