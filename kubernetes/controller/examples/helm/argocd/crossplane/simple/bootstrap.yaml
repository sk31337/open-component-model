apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: helm-argocd-crossplane-simple-repository
spec:
  repositorySpec:
    # Adjust to your OCM repository
    baseUrl: http://image-registry:5000
    type: OCIRegistry
  interval: 10m
---

apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: helm-argocd-crossplane-simple-component
spec:
  component: ocm.software/ocm-k8s-toolkit/examples/helm-argocd-crossplane-simple
  repositoryRef:
    name: helm-argocd-crossplane-simple-repository
  semver: 1.0.0
  interval: 10m
