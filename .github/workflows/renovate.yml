name: Renovate OCM
on:
  schedule:
    - cron: '0 0 * * *' # At 00:0, every day
  workflow_dispatch:
    inputs:
      repoCache:
        description: 'Reset or disable the cache?'
        type: choice
        default: enabled
        options: [ enabled, disabled, reset ]
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - .github/renovate.json5
      - .github/workflows/renovate.yml

permissions:
  contents: read

env:
  cache_archive: renovate_cache.tar.gz
  cache_dir: /tmp/renovate/cache/renovate/repository
  cache_key: renovate-cache
  RENOVATE_CONFIG_FILE: .github/renovate.json5

jobs:
  renovate:
    runs-on: ubuntu-24.04-arm
    environment:
      name: automation
      deployment: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout:
            ${{ env.RENOVATE_CONFIG_FILE }}
          persist-credentials: false

      # Restore previous cache artifact if enabled
      - name: Restore renovate cache artifact
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.repoCache != 'disabled' }}
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        continue-on-error: true
        with:
          name: ${{ env.cache_key }}
          path: cache-download

      - name: Extract renovate cache
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.repoCache != 'disabled' }}
        run: |
          set -euxo pipefail
          if [ ! -d cache-download ]; then
            echo "No cache found."
            exit 0
          fi
          mkdir -p "$cache_dir"
          tar -xzf "cache-download/${cache_archive}" -C "$cache_dir"
          sudo chown -R 12021:0 /tmp/renovate/
          ls -R "$cache_dir" || true

      - if: ${{ github.event_name != 'pull_request' && github.repository_owner == 'open-component-model' }}
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.OCMBOT_APP_ID }}
          private-key: ${{ secrets.OCMBOT_PRIV_KEY }}
          repositories: ${{ github.event.repository.name }}
          # Post per-PR check results.
          permission-checks: write
          # Push Renovate branches.
          permission-contents: write
          # Maintain the dependency dashboard issue.
          permission-issues: write
          # Open and update dependency-update PRs.
          permission-pull-requests: write
          # Post commit statuses on Renovate PRs.
          permission-statuses: write
          # Bump action SHAs in .github/workflows/*.
          permission-workflows: write

      - name: Ensure Dry-Run on Pull Requests
        if: ${{ github.event_name == 'pull_request' }}
        run: echo "RENOVATE_DRY_RUN=extract" >> $GITHUB_ENV

      - name: Run
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          env-regex: |
            ^(?:RENOVATE_\w+|LOG_LEVEL|GITHUB_COM_TOKEN|NODE_OPTIONS|(?:HTTPS?|NO)_PROXY|(?:https?|no)_proxy)$
          token: ${{ steps.generate_token.outputs.token || secrets.GITHUB_TOKEN }}
        env:
          RENOVATE_ONBOARDING: 'false'
          RENOVATE_USERNAME: 'ocmbot[bot]'
          RENOVATE_PLATFORM: 'github'
          RENOVATE_PLATFORM_COMMIT: 'true'
          RENOVATE_REPOSITORIES: "${{ github.repository }}"
          RENOVATE_REPOSITORY_CACHE: ${{ github.event_name == 'workflow_dispatch' && inputs.repoCache || 'enabled' }}
          RENOVATE_ALLOWED_COMMANDS: |
            ^./.github/scripts/renovate-post-upgrade.sh$

      - name: Compress renovate cache
        if: ${{ env.RENOVATE_DRY_RUN == '' && (github.event_name != 'workflow_dispatch' || inputs.repoCache != 'disabled') }}
        run: |
          set -euxo pipefail
          ls "$cache_dir" || true
          tar -czvf "$cache_archive" -C "$cache_dir" .

      - name: Upload renovate cache artifact
        if: ${{ env.RENOVATE_DRY_RUN == '' && (github.event_name != 'workflow_dispatch' || inputs.repoCache != 'disabled') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.cache_key }}
          path: ${{ env.cache_archive }}
          retention-days: 1
