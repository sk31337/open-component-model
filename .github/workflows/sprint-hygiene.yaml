name: Sprint Hygiene

on:
  schedule:
    - cron: '0 3 * * *' # Every night at 3 AM UTC
  workflow_dispatch:

permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update-expired-sprints:
    name: Move "Needs Refinement" issues with expired sprints to current sprint
    runs-on: ubuntu-24.04-arm
    environment:
      name: automation
      deployment: false
    steps:
      - name: Generate App Token
        id: get_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.OCMBOT_APP_ID }}
          private-key: ${{ secrets.OCMBOT_PRIV_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.get_token.outputs.token }}
          script: |
            const script = await import('${{ github.workspace }}/.github/scripts/sprint-hygiene.js');
            await script.default({ github, core, context, projectNumber: 10 });
