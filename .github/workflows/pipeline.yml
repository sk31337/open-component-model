name: monorepo shared build & publish

# Reusable build & publish chain for the whole monorepo. Owns the dependency
# order across CLI and controller: build (in parallel) → conformance + e2e
# gates (in parallel) → publish to GHCR. Drives daily CI on main/release
# branches and is reused by release.yml for tagged releases.
#
# It has the following stages: build_cli, build_controller (these are executed in parallel)
# from here, if success, conformance and e2e run concurrently, and then finally,
# if required, publish_*. Conformance and e2e are _BOTH_ gates to pushing: if
# either fails there will be nothing in GHCR.

on:
  # No paths filter on push: every push to main/release branches rebuilds and
  # republishes so the floating `main` tag in GHCR tracks HEAD. PRs stay
  # path-gated below to avoid running the full pipeline on unrelated changes.
  push:
    branches:
      - main
      - 'releases/v**'
  pull_request:
    branches:
      - main
    paths:
      - 'cli/**'
      - 'kubernetes/controller/**'
      - 'conformance/**'
      - '.github/workflows/cli.yml'
      - '.github/workflows/kubernetes-controller.yml'
      - '.github/workflows/conformance.yml'
      - '.github/workflows/pipeline.yml'
      - '.env'
  workflow_call:
    inputs:
      ref:
        description: "Ref to build (branch, tag, or sha). Defaults to caller's ref."
        type: string
        required: false
      build_version:
        description: "Override version embedded in the CLI binary via ldflags. Used by release.yml to embed the base version (e.g. v0.5.0) in RC builds."
        type: string
        required: false
    outputs:
      cli_artifact_name:
        description: "CLI artifact name (binaries + OCI layout) from the build job."
        value: ${{ jobs.build_cli.outputs.artifact_name }}
      cli_version:
        description: "Version computed/embedded for the CLI build."
        value: ${{ jobs.build_cli.outputs.version }}
      cli_image_digest:
        description: "Digest of the pushed CLI OCI image (when published)."
        value: ${{ jobs.publish_cli.outputs.image_digest }}
      controller_version:
        description: "Version computed for the controller build."
        value: ${{ jobs.build_controller.outputs.version }}
      controller_chart_artifact_name:
        description: "Name of the chart artifact (with digest) produced by publish."
        value: ${{ jobs.publish_controller.outputs.chart_artifact_name }}
      controller_image_digest:
        description: "Digest of the pushed controller image."
        value: ${{ jobs.publish_controller.outputs.image_digest }}
      controller_chart_digest:
        description: "Digest of the pushed Helm chart."
        value: ${{ jobs.publish_controller.outputs.chart_digest }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  # === This is new: workflow_call wiring ===
  build_cli:
    uses: ./.github/workflows/cli.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      ref: ${{ inputs.ref }}
      build_version: ${{ inputs.build_version }}

  build_controller:
    uses: ./.github/workflows/kubernetes-controller.yml
    permissions:
      contents: read
      actions: read
    with:
      ref: ${{ inputs.ref }}
  # === workflow_call end ===

  # === This is new, but it replaces conformance and conformance-pr/published in cli.yml + kubernetes-controller.yml ===
  conformance:
    name: Conformance
    needs: [build_cli, build_controller]
    uses: ./.github/workflows/conformance.yml
    with:
      cli_artifact: ${{ needs.build_cli.outputs.artifact_name }}
      cli_version: ${{ needs.build_cli.outputs.version }}
      toolkit_image_artifact: ${{ needs.build_controller.outputs.artifact_name }}
      toolkit_chart_artifact: ${{ needs.build_controller.outputs.chart_pr_artifact }}
      toolkit_version: ${{ needs.build_controller.outputs.version }}
  # === end replace ===

  # === New: E2E lifted out of kubernetes-controller.yml so it runs concurrently
  # with conformance instead of serializing ahead of it. Needs only the
  # controller build; gates publish alongside conformance. ===
  e2e:
    name: E2E
    needs: [build_controller]
    uses: ./.github/workflows/e2e.yml
    permissions:
      contents: read
      actions: read
    with:
      ref: ${{ inputs.ref }}
      controller_image_artifact: ${{ needs.build_controller.outputs.artifact_name }}
      controller_version: ${{ needs.build_controller.outputs.version }}
  # === end ===

  # === New this part is a copy from cli.yml::build::branch-check + kubernetes-controller.yml::build::branch-check ===
  # Changes include things for the modified tag regex.
  decide_publish:
    name: Decide Publish
    needs: [conformance, e2e]
    runs-on: ubuntu-24.04-arm
    outputs:
      publish: ${{ steps.check.outputs.publish }}
      ref: ${{ steps.check.outputs.ref }}
    steps:
      - name: Decide
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          INPUT_REF: ${{ inputs.ref }}
        with:
          script: |
            const ref = process.env.INPUT_REF || process.env.GITHUB_HEAD_REF || process.env.GITHUB_REF_NAME;
            core.setOutput('ref', ref);
            if (context.eventName === 'pull_request') {
              core.setOutput('publish', 'false');
              return;
            }
            const defaultBranch = context.payload.repository?.default_branch || 'main';
            // Matches version refs like: v1.2, v1.2.3, v1.2.3-rc.1, v0.7.0-alpha, v10.0.0-beta.2+build5
            const eligible = ref === defaultBranch || /^v\d+\.\d+(\.\d+)?(-.*)?$/.test(ref);
            core.setOutput('publish', eligible ? 'true' : 'false');
  # === cli.yml::build::branch-check + kubernetes-controller.yml::build::branch-check ===

  # === This is from cli.yml::publish verbatim a date on conformance ===
  publish_cli:
    name: Publish CLI
    needs: [build_cli, decide_publish]
    if: ${{ needs.decide_publish.outputs.publish == 'true' }}
    runs-on: ubuntu-24.04-arm
    outputs:
      image_digest: ${{ steps.digest.outputs.digest }}
    permissions:
      contents: read
      actions: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.build_cli.outputs.artifact_name }}

      - name: Set LAYOUT
        env:
          LAYOUT: ${{ github.workspace }}/oci/cli.tar
        run: |
          test -e "$LAYOUT" || exit 1
          echo "LAYOUT=$LAYOUT" >> "$GITHUB_ENV"

      - name: Setup ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set TARGET_REPO
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "TARGET_REPO=${REGISTRY}/${OWNER,,}/cli" >> "$GITHUB_ENV"

      - name: Push OCI image
        env:
          VERSION: ${{ needs.build_cli.outputs.version }}
        run: oras cp --from-oci-layout "${LAYOUT}:${VERSION}" "${TARGET_REPO}:${VERSION}"

      - name: Tag image with main floating tag
        if: ${{ needs.decide_publish.outputs.ref == 'main' }}
        env:
          VERSION: ${{ needs.build_cli.outputs.version }}
        run: oras tag "${TARGET_REPO}:${VERSION}" "main"

      - name: Resolve digest
        id: digest
        env:
          VERSION: ${{ needs.build_cli.outputs.version }}
        run: echo "digest=$(oras resolve ${TARGET_REPO}:${VERSION})" >> "$GITHUB_OUTPUT"

      - name: Attest OCI image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          subject-name: ${{ env.TARGET_REPO }}
          push-to-registry: true
  # === cli.yml::publish ===

  # === Same as above but for Kubernetes publish. ===
  publish_controller:
    name: Publish Controller
    needs: [build_controller, decide_publish]
    if: ${{ needs.decide_publish.outputs.publish == 'true' }}
    runs-on: ubuntu-24.04-arm
    outputs:
      image_digest: ${{ steps.image-digest.outputs.digest }}
      chart_digest: ${{ steps.chart-digest.outputs.digest }}
      chart_artifact_name: controller-chart-${{ needs.build_controller.outputs.version }}
    permissions:
      contents: read
      actions: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      LOCATION: kubernetes/controller
      REF: ${{ needs.decide_publish.outputs.ref }}
    steps:
      - name: Compute image refs (lowercase owner)
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER="${OWNER,,}"
          {
            echo "IMAGE_NAME=ghcr.io/$OWNER/kubernetes/controller"
            echo "CHART_REPO=ghcr.io/$OWNER/kubernetes/controller/chart"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref_name }}
          sparse-checkout: |
            ${{ env.LOCATION }}
            Taskfile.yml
            .env
          persist-credentials: false

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: 3.x

      - name: Setup ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download controller image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.build_controller.outputs.artifact_name }}
          path: ${{ env.LOCATION }}/tmp/oci

      - name: Extract OCI layout
        working-directory: ${{ env.LOCATION }}
        run: task oci/extract TAR_PATH=tmp/oci/controller.tar OUTPUT_DIR=tmp/oci-dir

      - name: Push image from OCI layout
        working-directory: ${{ env.LOCATION }}
        env:
          VERSION: ${{ needs.build_controller.outputs.version }}
        run: oras cp --from-oci-layout tmp/oci-dir:${VERSION} ${IMAGE_NAME}:${VERSION}

      - name: Tag image with main floating tag
        if: ${{ env.REF == 'main' }}
        env:
          VERSION: ${{ needs.build_controller.outputs.version }}
        run: oras tag "${IMAGE_NAME}:${VERSION}" "main"

      - name: Resolve image digest
        id: image-digest
        env:
          VERSION: ${{ needs.build_controller.outputs.version }}
        run: echo "digest=$(oras resolve ${IMAGE_NAME}:${VERSION})" >> "$GITHUB_OUTPUT"

      - name: Attest image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          subject-digest: ${{ steps.image-digest.outputs.digest }}
          subject-name: ${{ env.IMAGE_NAME }}
          push-to-registry: true

      - name: Package and push chart with digest
        working-directory: ${{ env.LOCATION }}
        env:
          VERSION: ${{ needs.build_controller.outputs.version }}
          IMAGE_DIGEST: ${{ steps.image-digest.outputs.digest }}
        run: |
          task helm/package VERSION="${VERSION}" APP_VERSION="${VERSION}" IMAGE_DIGEST="${IMAGE_DIGEST}" IMAGE_REPOSITORY="${IMAGE_NAME}"
          task helm/push VERSION="${VERSION}" REGISTRY="${IMAGE_NAME}"

      - name: Tag chart with main floating tag
        if: ${{ env.REF == 'main' }}
        env:
          VERSION: ${{ needs.build_controller.outputs.version }}
        run: oras tag "${CHART_REPO}:${VERSION}" "main"

      - name: Resolve chart digest
        id: chart-digest
        env:
          VERSION: ${{ needs.build_controller.outputs.version }}
        run: echo "digest=$(oras resolve ${CHART_REPO}:${VERSION})" >> "$GITHUB_OUTPUT"

      - name: Attest chart
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          subject-digest: ${{ steps.chart-digest.outputs.digest }}
          subject-name: ${{ env.CHART_REPO }}
          push-to-registry: true

      - name: Upload chart artifact (with digest)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: controller-chart-${{ needs.build_controller.outputs.version }}
          retention-days: 1
          path: ${{ env.LOCATION }}/dist/chart-*.tgz
          if-no-files-found: error
  # === end ===
