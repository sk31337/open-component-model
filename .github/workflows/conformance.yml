name: Conformance

on:
  workflow_call:
    inputs:
      cli_image:
        description: "CLI Docker image reference"
        type: string
        required: false
        default: ""
      toolkit_image:
        description: "OCI reference to the controller Helm chart (with optional version tag)"
        type: string
        required: false
        default: ""
      cli_artifact:
        description: "Artifact name containing the CLI OCI layout (PR mode)"
        type: string
        required: false
        default: ""
      cli_version:
        description: "CLI image version/tag (required when cli_artifact is set)"
        type: string
        required: false
        default: ""
      toolkit_chart_artifact:
        description: "Artifact name containing the packaged Helm chart .tgz (PR mode)"
        type: string
        required: false
        default: ""
      toolkit_image_artifact:
        description: "Artifact name containing the controller OCI layout (PR mode)"
        type: string
        required: false
        default: ""
      toolkit_version:
        description: "Controller image version/tag (required when toolkit_image_artifact is set)"
        type: string
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - conformance/**
      - .github/workflows/conformance.yml
  pull_request:
    branches:
      - main
    paths:
      - conformance/**
      - .github/workflows/conformance.yml

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CONTROLLER_IMAGE_NAME: ${{ github.repository_owner }}/kubernetes/controller

jobs:
  conformance:
    name: Sovereign Scenario (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 30
    # Extend the matrix with additional architectures if needed in the future.
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: conformance/scenarios/sovereign
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: conformance/scenarios/sovereign/components/notes/go.mod
          cache-dependency-path: conformance/scenarios/sovereign/components/notes/go.sum
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.1.3
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@04acaec6161ac4fb1a82ffafa88901c03271d34f # v2.8.6

      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.31.0

      # Artifact mode: Download and prepare CLI image
      - name: Download CLI artifact
        if: ${{ inputs.cli_artifact != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.cli_artifact }}
          path: tmp/cli-artifact

      # Skopeo is pre-installed on ubuntu-latest but may be missing on ARM runners.
      - name: Ensure skopeo is installed
        run: command -v skopeo || { sudo apt-get update -qq && sudo apt-get install -yqq skopeo; }

      # Skopeo can extract by platform (--override-arch) AND convert to docker-archive.
      - name: Load CLI image into Docker daemon
        if: ${{ inputs.cli_artifact != '' }}
        env:
          CLI_VERSION: ${{ inputs.cli_version }}
          CLI_IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/cli
        run: |
          mkdir -p tmp/cli-oci-dir
          tar -xf tmp/cli-artifact/oci/cli.tar -C tmp/cli-oci-dir
          skopeo --override-arch ${{ matrix.arch }} --override-os linux copy \
            oci:tmp/cli-oci-dir:${CLI_VERSION} \
            docker-archive:tmp/cli-docker.tar:${CLI_IMAGE_NAME}:${CLI_VERSION}
          docker load < tmp/cli-docker.tar
          echo "CLI_IMAGE=${CLI_IMAGE_NAME}:${CLI_VERSION}" >> "$GITHUB_ENV"

      # Artifact mode: Download and prepare controller image + chart
      - name: Download controller image artifact
        if: ${{ inputs.toolkit_image_artifact != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.toolkit_image_artifact }}
          path: tmp/controller-artifact

      # Skopeo can extract by platform (--override-arch) AND convert to docker-archive.
      - name: Prepare controller image for kind
        if: ${{ inputs.toolkit_image_artifact != '' }}
        env:
          TOOLKIT_VERSION: ${{ inputs.toolkit_version }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE_NAME }}
        run: |
          mkdir -p tmp/controller-oci-dir
          tar -xf tmp/controller-artifact/controller.tar -C tmp/controller-oci-dir
          skopeo --override-arch ${{ matrix.arch }} --override-os linux copy \
            oci:tmp/controller-oci-dir:${TOOLKIT_VERSION} \
            docker-archive:tmp/controller-docker.tar:${IMAGE_NAME}:${TOOLKIT_VERSION}
          echo "PRELOAD_IMAGES=${{ github.workspace }}/tmp/controller-docker.tar" >> "$GITHUB_ENV"

      - name: Download chart artifact
        if: ${{ inputs.toolkit_chart_artifact != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.toolkit_chart_artifact }}
          path: tmp/chart-artifact

      - name: Set toolkit image to local chart
        if: ${{ inputs.toolkit_chart_artifact != '' }}
        run: |
          CHART_PATH=$(ls tmp/chart-artifact/chart-*.tgz)
          echo "TOOLKIT_IMAGE=${{ github.workspace }}/${CHART_PATH}" >> "$GITHUB_ENV"

      # Set inputs as env vars (artifact steps above take precedence via GITHUB_ENV).
      # Task picks up env vars automatically through the {{ .VAR | default }} pattern.
      - name: Set inputs as environment variables
        run: |
          if [ -z "$CLI_IMAGE" ] && [ -n "$INPUT_CLI_IMAGE" ]; then
            echo "CLI_IMAGE=${INPUT_CLI_IMAGE}" >> "$GITHUB_ENV"
          fi
          if [ -z "$TOOLKIT_IMAGE" ] && [ -n "$INPUT_TOOLKIT_IMAGE" ]; then
            echo "TOOLKIT_IMAGE=${INPUT_TOOLKIT_IMAGE}" >> "$GITHUB_ENV"
          fi
        env:
          INPUT_CLI_IMAGE: ${{ inputs.cli_image }}
          INPUT_TOOLKIT_IMAGE: ${{ inputs.toolkit_image }}

      - name: Validate required image references
        if: ${{ github.event_name == 'workflow_call' }}
        run: |
          if [ -z "$CLI_IMAGE" ] && [ -z "$TOOLKIT_IMAGE" ]; then
            echo "::error::Neither CLI_IMAGE nor TOOLKIT_IMAGE is set. At least one must be provided via inputs or artifacts."
            exit 1
          fi
          echo "CLI_IMAGE=${CLI_IMAGE:-(using Taskfile default)}"
          echo "TOOLKIT_IMAGE=${TOOLKIT_IMAGE:-(using Taskfile default)}"

      - name: Check dependencies
        working-directory: conformance/scenarios/sovereign
        run: task check
      - name: Run conformance scenario
        working-directory: conformance/scenarios/sovereign
        run: task run
      - name: Run upgrade scenario
        working-directory: conformance/scenarios/sovereign
        run: task upgrade
      - name: Verify upgrade
        working-directory: conformance/scenarios/sovereign
        run: >-
          task verify:deployment
      - name: Show status
        if: always()
        working-directory: conformance/scenarios/sovereign
        run: task status
      - name: Cleanup
        if: always()
        working-directory: conformance/scenarios/sovereign
        run: task clean
