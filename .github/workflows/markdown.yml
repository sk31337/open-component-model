name: Markdown

on:
  pull_request:
    branches:
      - main
      - website/**
    paths:
      - '**/*.md'
      - '.github/workflows/markdown.yml'

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Lint Markdown (website)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: |
            website/**/*.md
            !website/content/docs/reference/ocm-cli
            !website/content/docs/reference/ocm-controller
          config: .github/config/website.markdownlint-cli2.yaml

  spellcheck:
    name: Spellcheck
    # rojopolis/spellcheck-github-actions uses docker://jonasbn/github-action-spellcheck
    # which is an amd64-only image with no ARM64 manifest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Spellcheck
        uses: rojopolis/spellcheck-github-actions@e3cd8e9aec4587ec73bc0e60745aafd45c37aa2e # v0
        with:
          config_path: .github/config/spellcheck.yml
          task_name: Markdown

  verify-links:
    name: Verify links (repo)
    # action-linkspector uses Puppeteer, which downloads an x86-only Chrome
    # binary on ARM runners — run on amd64 until upstream ships ARM support.
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
          persist-credentials: false
      - name: Run linkspector
        uses: umbrelladocs/action-linkspector@15f97e56ba84c3f637f2b35035c159c871ae6bb3 # v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-check
          fail_level: any
          config_file: .github/config/linkspector.yaml
          show_stats: true

  verify-links-website:
    name: Verify links (website)
    # action-linkspector uses Puppeteer (see verify-links comment above).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Check for website changes
        id: check_changes
        # HEAD is the PR merge commit, so HEAD^1 is the base branch tip
        # (fetch-depth: 2 above makes both available).
        run: |
          CHANGED=$(git diff --name-only HEAD^1 HEAD | grep -c '^website/' || true)
          echo "has_website_changes=$([[ "$CHANGED" -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Wait for Netlify Deploy Preview
        if: steps.check_changes.outputs.has_website_changes == 'true'
        id: wait_for_preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Poll the netlify/ocm-website/deploy-preview commit status rather
        # than Netlify's check suite — the status is posted as soon as the
        # preview is ready, while the check suite shows up minutes later
        # (or not at all). A single deploy takes ~6 minutes, but Netlify
        # builds one deploy at a time, so push bursts can queue up delays
        # beyond that; on a timeout, re-run the job once the queue drains.
        run: |
          set -euo pipefail
          echo "Waiting up to 30 minutes for Netlify deploy preview..."
          export REPO="${{ github.repository }}"
          export SHA="${{ github.event.pull_request.head.sha }}"
          export GITHUB_OUTPUT

          if ! timeout 1800 bash -c '
            ELAPSED=0
            while true; do
              if ! STATUS_JSON=$(gh api repos/"$REPO"/commits/"$SHA"/status 2>/dev/null) \
                || ! echo "$STATUS_JSON" | jq -e .statuses > /dev/null 2>&1; then
                echo "[ERROR] gh api or jq failed, retrying..."
                sleep 15; ELAPSED=$((ELAPSED + 15))
                continue
              fi
              PREVIEW_STATUS=$(echo "$STATUS_JSON" | jq "[ .statuses[] | select(.context==\"netlify/ocm-website/deploy-preview\") ]")
              if [ "$(echo "$PREVIEW_STATUS" | jq length)" -eq 0 ]; then
                echo "No deploy-preview status yet (${ELAPSED}s elapsed). Waiting..."
                sleep 30; ELAPSED=$((ELAPSED + 30))
                continue
              fi
              STATE=$(echo "$PREVIEW_STATUS" | jq -r ".[0].state")
              echo "Deploy preview state: $STATE (${ELAPSED}s elapsed)"
              case "$STATE" in
                success)
                  PREVIEW_URL=$(echo "$PREVIEW_STATUS" | jq -r ".[0].target_url")
                  if [ -z "$PREVIEW_URL" ] || [ "$PREVIEW_URL" = "null" ]; then
                    echo "[ERROR] Deploy preview succeeded but has no target_url."
                    exit 1
                  fi
                  echo "Deploy Preview ready: $PREVIEW_URL"
                  echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
                failure|error)
                  echo "Deploy failed: $STATE"
                  exit 1
                  ;;
              esac
              sleep 30; ELAPSED=$((ELAPSED + 30))
            done
          '; then
            echo "Netlify deploy preview did not report success within 30 minutes."
            exit 1
          fi

      - name: Generate linkspector config
        if: steps.check_changes.outputs.has_website_changes == 'true'
        env:
          BASEURL: ${{ steps.wait_for_preview.outputs.preview_url }}
        run: |
          cat > .github/config/website-linkspector.yaml << EOF
          dirs:
            - ./website/content
          baseUrl: "${BASEURL}"
          modifiedFilesOnly: true
          replacementPatterns:
            - pattern: "^/"
              replacement: "${BASEURL}/"
          ignorePatterns:
            - pattern: '/images/.*'
          EOF

          echo "Generated config:"
          cat .github/config/website-linkspector.yaml

      - name: Run linkspector
        if: steps.check_changes.outputs.has_website_changes == 'true'
        uses: umbrelladocs/action-linkspector@15f97e56ba84c3f637f2b35035c159c871ae6bb3 # v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-check
          fail_level: any
          config_file: .github/config/website-linkspector.yaml
          show_stats: true

  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      - name: Read tool versions
        id: versions
        run: |
          source .env
          echo "markdownlint_cli2=${MARKDOWNLINT_CLI2_VERSION}" >> $GITHUB_OUTPUT
      - name: Run linter
        env:
          MARKDOWNLINT_VERSION: ${{ steps.versions.outputs.markdownlint_cli2 }}
        run: npx "markdownlint-cli2@${MARKDOWNLINT_VERSION}" --config .github/config/.markdownlint-cli2.yaml "**/*.md"
