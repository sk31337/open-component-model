name: "Website: Manually Retrigger OCM CLI Docs Update"

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Which version (e.g. v0.42.0) do you want to publish?
        required: true
        default: ''

permissions:
  contents: read

jobs:
  retrigger:
    name: Create new "Release Publish Event"
    runs-on: ubuntu-24.04-arm
    environment:
      name: automation
      deployment: false
    steps:
    - name: Generate token
      id: generate_token
      uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
      with:
        app_id: ${{ secrets.OCMBOT_APP_ID }}
        private_key: ${{ secrets.OCMBOT_PRIV_KEY }}
    - name: Ensure proper version
      env:
        TOKEN: ${{ steps.generate_token.outputs.token }}
        INPUT_VERSION: ${{ github.event.inputs.version }}
      run: |
        curl -sSL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/repos/open-component-model/ocm/releases > releases.json
        jq -r '.[] | .tag_name' releases.json | grep -v -E '.*-rc|latest' > versions.txt
        if grep -Fxq "${INPUT_VERSION}" versions.txt; then
          echo "Version (${INPUT_VERSION}) found!"
        else
          echo "Version (${INPUT_VERSION}) not found! This are the availble ones:"
          cat versions.txt
          exit 1
        fi
        echo "RELEASE_VERSION=$(echo "${INPUT_VERSION}" )" >> $GITHUB_ENV
    - name: Publish Event
      uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
      with:
        token: ${{ steps.generate_token.outputs.token }}
        repository: ${{ github.repository }}
        event-type: ocm-cli-release
        client-payload: '{"tag": "${{ env.RELEASE_VERSION }}"}'
