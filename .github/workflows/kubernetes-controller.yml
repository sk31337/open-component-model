name: Kubernetes Controller

on:
  # Trigger workflow on pushes to main or release branches, and on PRs targeting main.
  # Pushes on 'releases/v**' don't automatically publish,
  # they just run the build and e2e test to validate the release branch.
  push:
    branches:
      - main
      - 'releases/v**'
    paths:
      - kubernetes/controller/**/*
      - .github/workflows/kubernetes-controller.yml
      - .env
  pull_request:
    branches:
      - main
    paths:
      - kubernetes/controller/**/*
      - .github/workflows/kubernetes-controller.yml
      - .env
  workflow_call:
    inputs:
      artifact_name:
        description: "The artifact name to build."
        type: string
        required: false
      ref:
        description: "The ref to build on (branch or tag). Defaults to the current ref."
        type: string
        required: false
    outputs:
      artifact_name:
        description: "The artifact name that was built."
        value: ${{ jobs.build.outputs.artifact_name }}
      artifact_id:
        description: "The artifact id that was built."
        value: ${{ jobs.build.outputs.artifact_id }}
      image_digest:
        description: "The digest of the pushed controller image (sha256:...)."
        value: ${{ jobs.publish.outputs.image_digest }}
      chart_digest:
        description: "The digest of the pushed Helm chart (sha256:...)."
        value: ${{ jobs.publish.outputs.chart_digest }}
      chart_artifact_name:
        description: "The artifact name containing the packaged Helm chart."
        value: ${{ jobs.publish.outputs.chart_artifact_name }}

env:
  LOCATION: "kubernetes/controller"
  REGISTRY: ghcr.io
  REF: ${{ inputs.ref || github.head_ref || github.ref_name }}
  ARTIFACT_NAME: ${{ inputs.artifact_name || 'controller-artifacts' }}
  CHECKOUT_REPO: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

permissions:
  contents: read # for actions/checkout to fetch code

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify-chart:
    name: Verify Chart
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.1.3

      - name: Validate chart (generators + lint + template + drift check)
        working-directory: ${{ env.LOCATION }}
        run: task helm/validate

      - name: Verify no uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Uncommitted changes detected after running helm tasks"
            git status && git diff
            exit 1
          fi
          echo "No uncommitted changes detected"

  build:
    name: Build Controller
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    needs: verify-chart
    outputs:
      artifact_name: ${{ env.ARTIFACT_NAME }}
      artifact_id: ${{ steps.upload-artifacts.outputs.artifact-id }}
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.branch-check.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.CHECKOUT_REPO }}
          sparse-checkout: |
            .github/scripts
            ${{ env.LOCATION }}
            Taskfile.yml
            .env
          persist-credentials: false
          ref: ${{ env.REF }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ env.LOCATION }}/go.mod
          cache-dependency-path: ${{ env.LOCATION }}/go.sum

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: 3.x

      - name: Setup docker/buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.1.3

      - name: Compute VERSION
        id: version
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          REF: ${{ env.REF }}
          TAG_PREFIX: "kubernetes/controller/v"
          # Kubernetes label values must be ≤63 chars (RFC 1123). We need to ensure the version fits within this limit
          # to be used as a label value in the Helm chart. helm.sh/chart is "<chart-name>-<version>"
          # Current chart name is "chart" = 6 chars including hyphen; 63 - 6 = 57 max version length.
          # TODO: If we change the chart name, we need to update this max version length.
          MAX_VERSION_LENGTH: "57"
        with:
          script: |
            const script = await import('${{ github.workspace }}/.github/scripts/compute-version.js');
            await script.default({ core });

      - name: Determine publish eligibility
        id: branch-check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          REF: ${{ env.REF }}
        with:
          script: |
            const ref = process.env.REF;
            const defaultBranch = context.payload.repository?.default_branch || 'main';
            // Publish for: main or release tags.
            // Release branches (releases/v*) only build+test.
            core.setOutput(
              'should_publish',
              ref === defaultBranch ||
              /^kubernetes\/controller\/v\d+\.\d+(\.\d+)?(-.*)?$/.test(ref)
            );

      - name: Build Multi-Arch Image to OCI Layout
        working-directory: ${{ env.LOCATION }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller
        run: |
          task docker-build/multi-arch \
            CONTROLLER_IMG="${IMAGE_NAME}:${VERSION}" \
            OCI_OUTPUT=tmp/oci/controller.tar

      # Package Helm chart without digest for use in PR conformance testing
      - name: Package Helm chart (without digest)
        working-directory: ${{ env.LOCATION }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller
        run: |
          task helm/package VERSION="${VERSION}" APP_VERSION="${VERSION}" IMAGE_REPOSITORY="${IMAGE_NAME}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        id: upload-artifacts
        with:
          if-no-files-found: error
          retention-days: 1
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.LOCATION }}/tmp/oci/

      # Upload chart artifact separately for easier access in PR conformance testing
      - name: Upload Chart Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: error
          retention-days: 1
          name: controller-chart-pr
          path: ${{ env.LOCATION }}/dist/chart-*.tgz

  E2E:
    name: E2E Tests (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 20
    needs: build
    # Extend the matrix with additional architectures if needed in the future.
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.CHECKOUT_REPO }}
          ref: ${{ env.REF }}
          sparse-checkout: |
            ${{ env.LOCATION }}
            Taskfile.yml
            .env
            website/static/install.sh
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ env.LOCATION }}/go.mod
          cache-dependency-path: ${{ env.LOCATION }}/go.sum

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up docker
        uses: docker/setup-docker-action@b2189fbf2a6592b51fee7cdd93ee2bfaeba733db # v5

      - name: Setup ocm
        run: bash website/static/install.sh

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@04acaec6161ac4fb1a82ffafa88901c03271d34f # v2.8.6

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.1.3

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ env.LOCATION }}/tmp/oci

      - name: Extract OCI layout from tar
        working-directory: ${{ env.LOCATION }}
        run: task oci/extract TAR_PATH=tmp/oci/controller.tar OUTPUT_DIR=tmp/oci-dir

      - name: Ensure skopeo is installed
        run: command -v skopeo || { sudo apt-get update -qq && sudo apt-get install -yqq skopeo; }

      - name: Extract image for E2E testing
        # Skopeo can extract by platform (--override-arch) AND convert to docker-archive.
        # Skopeo is pre-installed on ubuntu-latest but may be missing on ARM runners.
        # Set tag to "latest" to match the controller's Helm chart default for E2E testing
        working-directory: ${{ env.LOCATION }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller
        run: |
          mkdir -p tmp/docker
          skopeo --override-arch ${{ matrix.arch }} --override-os linux copy \
            oci:tmp/oci-dir:${VERSION} \
            docker-archive:tmp/docker/controller.tar:${IMAGE_NAME}:latest
          echo "CONTROLLER_IMG=${IMAGE_NAME}:${VERSION}" >> "$GITHUB_ENV"

      - name: Run E2E tests
        run: |
          set -a && source ${{ env.LOCATION }}/.env && set +a
          bash ${{ env.LOCATION }}/test/e2e/hacks/setup.sh
          kind load image-archive "${{ env.LOCATION }}/tmp/docker/controller.tar"
          task ${{ env.LOCATION }}:test/e2e

      - name: Debug cluster state
        if: failure() || inputs.debug == true
        run: |
          echo "::group::Controller pods"
          kubectl -n ocm-k8s-toolkit-system get pods -o wide
          echo "::endgroup::"

          echo "::group::Controller logs (last 80 lines)"
          kubectl -n ocm-k8s-toolkit-system logs deploy/ocm-k8s-toolkit-controller-manager --tail=80 --all-containers || true
          echo "::endgroup::"

          echo "::group::Namespace events"
          kubectl -n ocm-k8s-toolkit-system get events --sort-by=.lastTimestamp || true
          echo "::endgroup::"

          echo "::group::Helm release"
          helm list -n ocm-k8s-toolkit-system
          echo "::endgroup::"

  # Run conformance tests against the built image before publishing
  conformance:
    name: Conformance
    needs: build
    uses: ./.github/workflows/conformance.yml
    with:
      toolkit_chart_artifact: controller-chart-pr
      toolkit_image_artifact: ${{ needs.build.outputs.artifact_name }}
      toolkit_version: ${{ needs.build.outputs.version }}

  publish:
    name: Publish and Attest Image & Chart
    runs-on: ubuntu-24.04-arm
    needs: [build, E2E, conformance]
    if: ${{ needs.build.outputs.should_publish == 'true' }}
    outputs:
      image_digest: ${{ steps.image-digest.outputs.digest }}
      chart_digest: ${{ steps.chart-digest.outputs.digest }}
      chart_artifact_name: controller-chart-${{ needs.build.outputs.version }}
      chart_version: ${{ needs.build.outputs.version }}
    permissions:
      contents: read
      actions: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.CHECKOUT_REPO }}
          ref: ${{ env.REF }}
          sparse-checkout: |
            ${{ env.LOCATION }}
            Taskfile.yml
            .env
          persist-credentials: false

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: 3.x

      - name: Setup ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.1.3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ env.LOCATION }}/tmp/oci

      - name: Extract OCI layout from tar
        working-directory: ${{ env.LOCATION }}
        run: task oci/extract TAR_PATH=tmp/oci/controller.tar OUTPUT_DIR=tmp/oci-dir

      - name: Push image from OCI layout
        working-directory: ${{ env.LOCATION }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller
        run: |
          oras cp --from-oci-layout tmp/oci-dir:${VERSION} ${IMAGE_NAME}:${VERSION}

      - name: Tag image with main floating tag
        if: ${{ env.REF == 'main' }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller
        run: |
          oras tag "${IMAGE_NAME}:${VERSION}" "main"

      - name: Resolve image digest
        id: image-digest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          DIGEST=$(oras resolve "${IMAGE_NAME}:${VERSION}")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          subject-digest: ${{ steps.image-digest.outputs.digest }}
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller
          push-to-registry: true

      - name: Package and push Helm chart
        working-directory: ${{ env.LOCATION }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          IMAGE_DIGEST: ${{ steps.image-digest.outputs.digest }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller
        run: |
          task helm/package VERSION="${VERSION}" APP_VERSION="${VERSION}" IMAGE_DIGEST="${IMAGE_DIGEST}" IMAGE_REPOSITORY="${IMAGE_NAME}"
          task helm/push VERSION="${VERSION}" REGISTRY="${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller"

      - name: Tag chart with main floating tag
        if: ${{ env.REF == 'main' }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          CHART_REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller/chart
        run: |
          oras tag "${CHART_REPO}:${VERSION}" "main"

      - name: Resolve chart digest
        id: chart-digest
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          CHART_REPO="${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller/chart"
          echo "digest=$(oras resolve ${CHART_REPO}:${VERSION})" >> "$GITHUB_OUTPUT"

      - name: Attest chart
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          subject-digest: ${{ steps.chart-digest.outputs.digest }}
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kubernetes/controller/chart
          push-to-registry: true

      - name: Upload chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: controller-chart-${{ needs.build.outputs.version }}
          retention-days: 1
          path: ${{ env.LOCATION }}/dist/chart-*.tgz
          if-no-files-found: error

  # Run conformance tests against the published image on main branch or release branches/tags
  conformance-published:
    name: Conformance (published)
    needs: publish
    uses: ./.github/workflows/conformance.yml
    with:
      toolkit_image: "oci://ghcr.io/${{ github.repository_owner }}/kubernetes/controller/chart:${{ needs.publish.outputs.chart_version }}"
