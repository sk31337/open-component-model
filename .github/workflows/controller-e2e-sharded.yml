name: "Controller E2E (Sharded)"

on:
  push:
    branches:
      - 'feat/proposal-for-e2e-and-user-demo-refactoring'
    paths:
      - kubernetes/controller/**/*
      - .github/workflows/controller-e2e-sharded.yml
      - .env
  workflow_dispatch: {}

env:
  LOCATION: "kubernetes/controller"

concurrency:
  cancel-in-progress: true
  group: k8s-constroller-e2e-sharded-${{ github.run_id }}

permissions:
  contents: read

jobs:
  discover:
    name: Discover Scenarios
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.shard.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            ${{ env.LOCATION }}
            Taskfile.yml
            .env
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ env.LOCATION }}/go.mod
          cache-dependency-path: ${{ env.LOCATION }}/go.sum

      - name: Discover scenarios
        id: shard
        working-directory: ${{ env.LOCATION }}
        run: go run ./test/e2e/cmd/shard >> "$GITHUB_OUTPUT"

  e2e:
    name: "E2E: ${{ matrix.focus }}"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.matrix) }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            ${{ env.LOCATION }}
            Taskfile.yml
            .env
            website/static/install.sh
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ env.LOCATION }}/go.mod
          cache-dependency-path: ${{ env.LOCATION }}/go.sum

      - name: Install Task
        uses: arduino/setup-task@a2bd34e69f19b4cc026b2a9cc5214df7acdccccc # pre-release: PR #1394 (Node 24)
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up docker
        uses: docker/setup-docker-action@b2189fbf2a6592b51fee7cdd93ee2bfaeba733db # v5.1.0

      - name: Setup ocm
        run: bash website/static/install.sh

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@04acaec6161ac4fb1a82ffafa88901c03271d34f # v2.8.6

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.1.3

      - name: Setup cluster and run scenario
        working-directory: ${{ env.LOCATION }}
        run: |
          task test/e2e/setup/local
          task test/e2e -- "${{ matrix.focus }}"
