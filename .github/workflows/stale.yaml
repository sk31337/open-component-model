name: 'Mark stale issues and PRs'
on:
  schedule:
    - cron: '7 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:  # call reusable workflow from central '.github' repo
    permissions:
      issues: write
      pull-requests: write
      contents: read
    uses: open-component-model/.github/.github/workflows/stale.yml@6bd35dc7288d47e80637bc994f7212be4543258a # main