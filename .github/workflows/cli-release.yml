name: CLI Release

run-name: CLI Release from ${{ github.ref_name }}${{ github.event.inputs.dry_run == 'true' && '(dry-run)' || '' }}

# Dispatch model:
# The operator MUST select a release branch (e.g. releases/v0.4) in the
# GitHub UI "Use workflow from" dropdown. This sets github.ref_name for
# the entire run — there is no separate branch input.
# parseBranch() in release-versioning.js validates the format and rejects
# anything that doesn't match releases/v0.\d+.
#
# Interaction with cli.yml:
# This workflow calls cli.yml via workflow_call. In that context,
# github.ref_name in cli.yml inherits THIS workflow's ref (the release
# branch), NOT the ref input we pass. We pass inputs.ref = the RC tag
# (e.g. cli/v0.4.0-rc.1) so cli.yml checks out the right code AND uses
# it to determine publish eligibility. See cli.yml's branch-check step.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run RC phase without pushing tags or creating releases."
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  COMPONENT_PATH: cli

concurrency:
  cancel-in-progress: true
  group: cli-release-${{ github.ref_name }}

jobs:
  # ============================================================
  # PHASE 1: RELEASE CANDIDATE
  # ============================================================

  # --------------------------------------------------------
  # 1. PREPARE: Compute RC version and generate changelog
  # --------------------------------------------------------
  prepare:
    name: Prepare Release Metadata
    uses: ./.github/workflows/release-candidate-version.yml
    with:
      branch: ${{ github.ref_name }}
      component_path: cli # cannot use env here

  # --------------------------------------------------------
  # 2. TAG RC: Create and push RC tag (skipped on dry-run)
  # --------------------------------------------------------
  tag_rc:
    name: Create and Push RC Tag
    runs-on: ubuntu-24.04-arm
    needs: [prepare]
    if: ${{ github.event.inputs.dry_run == 'false' }}
    permissions:
      contents: write
    outputs:
      pushed: ${{ steps.tag.outputs.pushed }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            ${{ env.COMPONENT_PATH }}
            .github/scripts
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Setup git config
        env:
          ACTOR: ${{ github.actor }}
        run: |
          git config --global user.name "${ACTOR}"
          git config --global user.email "${ACTOR}@users.noreply.github.com"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY_FOR_SIGNING }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Create ${{ needs.prepare.outputs.new_tag }}
        id: tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          TAG: ${{ needs.prepare.outputs.new_tag }}
          # create-tag.js uses GITHUB_TOKEN to authenticate git push because
          # the checkout above sets persist-credentials: false (zizmor requirement).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const script = await import('${{ github.workspace }}/.github/scripts/create-tag.js');
            await script.createRcTag({ core });

  # --------------------------------------------------------
  # 3. BUILD CLI: calls cli.yml via workflow_call
  #    ref = RC tag (e.g. cli/v0.4.0-rc.1) → used for checkout and publish eligibility.
  #    Note: github.ref_name inside cli.yml will be the release branch (inherited from
  #    this workflow), not the ref input. cli.yml's branch-check uses inputs.ref to
  #    resolve this. See cli.yml for details.
  # --------------------------------------------------------
  build:
    name: Build CLI for ${{ needs.prepare.outputs.new_tag }}
    if: ${{ github.event.inputs.dry_run == 'false' && needs.tag_rc.outputs.pushed == 'true' }}
    needs: [prepare, tag_rc]
    permissions:
      contents: read
      actions: read            # Needed for artifact download
      packages: write          # Needed for pushing OCI images and provenance layers
      id-token: write          # Needed for provenance attestation identity
      attestations: write      # Allows storing provenance attestation
      artifact-metadata: write # Needed for github artifact metadata publishing for oci
    uses: ./.github/workflows/cli.yml
    with:
      ref: ${{ needs.prepare.outputs.new_tag }}
      build_version: ${{ needs.prepare.outputs.base_version }}

  # --------------------------------------------------------
  # 4. RELEASE RC: Create GitHub pre-release
  # --------------------------------------------------------
  release_rc:
    name: Create RC Pre-Release
    if: ${{ github.event.inputs.dry_run == 'false' && needs.tag_rc.outputs.pushed == 'true' }}
    needs: [prepare, tag_rc, build]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Download changelog artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.prepare.outputs.changelog_artifact }}
          path: ${{ runner.temp }}

      - name: Download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ runner.temp }}/rc-build-assets

      - name: Create RC Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ needs.prepare.outputs.new_tag }}
          RC_VERSION: ${{ needs.prepare.outputs.new_version }}
        run: |
          gh release create "${RC_TAG}" \
            --title "CLI ${RC_VERSION}" \
            --notes-file "${{ runner.temp }}/CHANGELOG.md" \
            --prerelease \
            "${{ runner.temp }}/rc-build-assets/bin/ocm-"* \
            "${{ runner.temp }}/rc-build-assets/oci/"*

      - name: Summarize RC release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RC_TAG: ${{ needs.prepare.outputs.new_tag }}
          RC_VERSION: ${{ needs.prepare.outputs.new_version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: process.env.RC_TAG,
            });
            const releaseUrl = release.data.html_url;
            const assetsCount = Array.isArray(release.data.assets) ? release.data.assets.length : 0;

            await core.summary
              .addHeading('RC Release Published')
              .addTable([
                [{ data: 'Field', header: true }, { data: 'Value', header: true }],
                ['RC Tag', process.env.RC_TAG],
                ['RC Version', process.env.RC_VERSION],
                ['Uploaded Assets', String(assetsCount)],
              ])
              .addEOL()
              .addLink(releaseUrl, releaseUrl)
              .addEOL()
              .write();

  # ================================================
  # PHASE 2: FINAL RELEASE (after environment gate)
  # ================================================
  # Environment Gate:
  # The "release" environment must be configured in GitHub Settings → Environments:
  # - Required reviewers: At least 1 reviewer must approve
  #
  # This gate blocks all Phase 2 jobs until approved.

  # -----------------------------------------------------------
  # 5. VERIFY ATTESTATIONS: Ensure RC artifacts are attestable
  # -----------------------------------------------------------
  verify_attestations:
    name: Verify RC Attestations
    needs: [prepare, build, release_rc]
    runs-on: ubuntu-24.04-arm
    environment:
      name: release
    permissions:
      contents: read
      packages: read
    steps:
      - name: Download RC binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ needs.prepare.outputs.new_tag }}
        run: |
          gh release download "$RC_TAG" \
            --repo "${{ github.repository }}" \
            --pattern "ocm-*" \
            --dir "${{ runner.temp }}/binaries"

      - name: Verify binary attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in ${{ runner.temp }}/binaries/ocm-*; do
            echo "Verifying $(basename "$file")..."
            gh attestation verify "$file" --repo "${{ github.repository }}"
          done
          echo "✅ All binary attestations verified"

      - name: Verify OCI image attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ needs.build.outputs.image_digest }}
          TARGET_REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/cli
        run: |
          echo "Verifying OCI image attestation for ${TARGET_REPO}@${IMAGE_DIGEST}..."
          gh attestation verify "oci://${TARGET_REPO}@${IMAGE_DIGEST}" --repo "${{ github.repository }}"
          echo "✅ OCI image attestation verified"

  # ---------------------------------------------------------
  # 6. PROMOTE FINAL: Create final tag and promote OCI image
  # ---------------------------------------------------------
  promote_final:
    name: Promote to Final Release
    needs: [prepare, build, verify_attestations]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            ${{ env.COMPONENT_PATH }}
            .github/scripts
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Setup git config
        env:
          ACTOR: ${{ github.actor }}
        run: |
          git config --global user.name "${ACTOR}"
          git config --global user.email "${ACTOR}@users.noreply.github.com"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY_FOR_SIGNING }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Create new release tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RC_TAG: ${{ needs.prepare.outputs.new_tag }}
          NEW_RELEASE_TAG: ${{ needs.prepare.outputs.promotion_tag }}
          # create-tag.js uses GITHUB_TOKEN to authenticate git push because
          # the checkout above sets persist-credentials: false (zizmor requirement).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const script = await import('${{ github.workspace }}/.github/scripts/create-tag.js');
            await script.createNewReleaseTag({ core });

      - name: Setup ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote OCI image tags
        env:
          RC_VERSION: ${{ needs.prepare.outputs.new_version }}
          NEW_RELEASE_VERSION: ${{ needs.prepare.outputs.base_version }}
          TARGET_REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/cli
          SET_LATEST: ${{ needs.prepare.outputs.set_latest }}
        run: |
          if [ "$SET_LATEST" = "true" ]; then
            oras tag "${TARGET_REPO}:${RC_VERSION}" "${NEW_RELEASE_VERSION}" "latest"
            echo "✅ Tagged :${NEW_RELEASE_VERSION} and :latest"
          else
            oras tag "${TARGET_REPO}:${RC_VERSION}" "${NEW_RELEASE_VERSION}"
            echo "⚠️ Tagged :${NEW_RELEASE_VERSION} (not setting :latest)"
          fi

  # --------------------------------------------------------
  # 7. RELEASE FINAL: Create GitHub final release
  # --------------------------------------------------------
  release_final:
    name: Create Final Release
    needs: [prepare, promote_final]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Get release notes from RC
        # Get release notes from RC release body to reuse for final release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ needs.prepare.outputs.new_tag }}
        run: |
          gh release view "$RC_TAG" \
            --repo "${{ github.repository }}" \
            --json body \
            --jq '.body' > "${{ runner.temp }}/CHANGELOG.md"

      - name: Download RC release assets
        # Download binaries and OCI tarballs from RC release assets to reuse for final release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ needs.prepare.outputs.new_tag }}
        run: |
          gh release download "$RC_TAG" \
            --repo "${{ github.repository }}" \
            --pattern "ocm-*" \
            --pattern "*.tar" \
            --dir "${{ runner.temp }}/assets"

      - name: Publish final release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RC_TAG: ${{ needs.prepare.outputs.new_tag }}
          NEW_RELEASE_TAG: ${{ needs.prepare.outputs.promotion_tag }}
          NEW_RELEASE_VERSION: ${{ needs.prepare.outputs.base_version }}
          TARGET_REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/cli
          ASSETS_DIR: ${{ runner.temp }}/assets
          NOTES_FILE: ${{ runner.temp }}/CHANGELOG.md
          SET_LATEST: ${{ needs.prepare.outputs.set_latest }}
          HIGHEST_PREVIOUS_RELEASE_VERSION: ${{ needs.prepare.outputs.highest_previous_release_version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const newReleaseTag = process.env.NEW_RELEASE_TAG;
            const newReleaseVersion = process.env.NEW_RELEASE_VERSION;
            const rcTag = process.env.RC_TAG;
            const targetRepo = process.env.TARGET_REPO;
            const assetsDir = process.env.ASSETS_DIR;
            const notesFile = process.env.NOTES_FILE;
            const setLatest = process.env.SET_LATEST === 'true';

            let notes = fs.existsSync(notesFile)
              ? fs.readFileSync(notesFile, 'utf8').trim()
              : `Promoted from ${rcTag}`;

            // Replace RC header with new release header by replacing the whole line
            // From: "[cli/v0.17.0-rc.1] - 2026-02-02"
            // To:   "[cli/v0.17.0] - promoted from [cli/v0.17.0-rc.1] on 2026-02-16"
            const today = new Date().toISOString().split('T')[0];
            // Regex to match the RC header line, ensuring it starts with "## [cli/v" and contains "-rc."
            const rcHeaderPattern = /^## \[cli\/v\d+\.\d+\.\d+-rc\.\d+\].*$/m;
            if (!rcHeaderPattern.test(notes)) {
              core.setFailed(`RC header not found in release notes for ${rcTag}`);
              return;
            }
            notes = notes.replace(
              rcHeaderPattern,
              `## [${newReleaseTag}] - promoted from [${rcTag}] on ${today}`
            );

            // Use make_latest to control whether this release is marked as "latest"
            // Only set as latest if this version >= highest existing release version
            const created = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: newReleaseTag,
              name: `CLI ${newReleaseVersion}`,
              body: notes,
              prerelease: false,
              make_latest: setLatest ? 'true' : 'false',
            });

            core.info(setLatest
              ? `✅ Release marked as Latest`
              : `⚠️ Release NOT marked as Latest (older patch release)`);

            // Upload all assets from RC release (binaries + OCI tarballs)
            const assets = fs.readdirSync(assetsDir).filter(f => f.startsWith('ocm-') || f.endsWith('.tar'));
            for (const file of assets) {
              const filePath = path.join(assetsDir, file);
              const data = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: created.data.id,
                name: file,
                data,
                headers: {
                  'content-type': 'application/octet-stream',
                },
              });
            }

            const releaseUrl = created.data.html_url;
            const highestPreviousReleaseVersion = process.env.HIGHEST_PREVIOUS_RELEASE_VERSION || '(none)';
            const ociTags = setLatest
              ? `${targetRepo}:${newReleaseVersion}, ${targetRepo}:latest`
              : `${targetRepo}:${newReleaseVersion}`;

            await core.summary
              .addHeading('New Release Published')
              .addTable([
                [{data: 'Field', header: true}, {data: 'Value', header: true}],
                ['New Release Tag', newReleaseTag],
                ['Promoted from RC', rcTag],
                ['Highest Previous Release Version', highestPreviousReleaseVersion],
                ['OCI Tags', ociTags],
                ['GitHub Latest', setLatest ? 'Yes' : 'No (older version)'],
                ['Uploaded Assets', String(assets.length)],
              ])
              .addEOL()
              .addLink(releaseUrl, releaseUrl)
              .addEOL()
              .write();
