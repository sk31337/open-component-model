[build.environment]
  NODE_VERSION = "25.8.1"
  NPM_VERSION = "11.11.1"
  GO_VERSION = "1.26.3"
  CONTROLLER_TOOLS_VERSION = "v0.20.1"

[build]
  # rebuild when paths mounted by the "main" site version change.
  # CRDs are generated from api/v1alpha1 at build time, so the trigger
  # follows the source of truth rather than the generated output.
  ignore = "git diff --quiet origin/main HEAD -- . ../cli/docs/reference ../bindings/go/constructor/spec/v1/resources ../bindings/go/descriptor/v2/resources ../kubernetes/controller/api/v1alpha1"

[context.deploy-preview]
  command = "(cd ../kubernetes/controller && mkdir -p bin/gen/crd && go run sigs.k8s.io/controller-tools/cmd/controller-gen@$CONTROLLER_TOOLS_VERSION crd paths=./... output:crd:artifacts:config=bin/gen/crd) && npm ci && npm run build -- --baseURL=$DEPLOY_PRIME_URL --buildDrafts --buildFuture"
  publish = "public"

[context.production]
  command = "(cd ../kubernetes/controller && mkdir -p bin/gen/crd && go run sigs.k8s.io/controller-tools/cmd/controller-gen@$CONTROLLER_TOOLS_VERSION crd paths=./... output:crd:artifacts:config=bin/gen/crd) && npm ci && npm run build"
  publish = "public"

[[plugins]]
  package = "netlify-plugin-submit-sitemap"

	[plugins.inputs]
    baseUrl = "https://doks.netlify.app/"
    sitemapPath = "/sitemap.xml"
    ignorePeriod = 0
    providers = [
      "google",
      "yandex"
    ]
