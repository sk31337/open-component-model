title: Open Component Model
baseurl: https://ocm.software
canonifyURLs: false
disableAliases: true
disableHugoGeneratorInject: true
# disableKinds: ["taxonomy", "term"]
enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
locale: en-US
summarylength: 20

defaultContentLanguage: en
disableLanguages: ["de", "nl"]
defaultContentLanguageInSubdir: false

editPage: false
lastMod: false

defaultContentVersionInSubdir: false
defaultContentVersion: main

pagination:
  pagerSize: 10

params:
  social: true

build:
  buildStats:
    enable: true

outputs:
  home: ["HTML", "searchIndex"]
  section: ["HTML", "RSS", "SITEMAP"]

outputFormats:
  searchIndex:
    mediaType: application/json
    baseName: search-index
    isPlainText: true
    notAlternative: true
  SITEMAP:
    mediaType: application/xml
    baseName: sitemap
    isHTML: false
    isPlainText: true
    noUgly: true
    rel: sitemap

sitemap:
  changefreq: monthly
  filename: sitemap.xml
  priority: 0.5

caches:
  getresource:
    dir: ":cacheDir/:project"
    maxAge: -1 # "30m"

taxonomies:
  contributor: contributors
  category: categories
  tag: tags

permalinks:
  docs: "/docs/:sections[1:]/:title/"

minify:
  disableSVG: true
  tdewolff:
    html:
      keepWhitespace: false

related:
  threshold: 80
  includeNewer: true
  toLower: false
  indices:
    - name: categories
      weight: 100
    - name: tags
      weight: 80
    - name: date
      weight: 10

imaging:
  anchor: Center
  bgColor: "#ffffff"
  hint: photo
  quality: 85
  resampleFilter: Lanczos

versions:
  main:
    weight: 1
  legacy:
    weight: 2

services:
  rss:
    limit: 20
